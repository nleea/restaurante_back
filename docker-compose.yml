services:
  db:
    image: postgres:16
    container_name: restaurante_db
    environment:
      POSTGRES_USER: restaurante
      POSTGRES_PASSWORD: restaurante
      POSTGRES_DB: restaurante
    ports:
      - "5432:5432"
    volumes:
      - restaurante_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restaurante"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: restaurante_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  restaurante_pgdata:
